name: Deploy Frontend SPA to GCP CDN (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-frontend-main
  cancel-in-progress: true

env:
  TF_DIR: infra/terraform/frontend_spa_cdn
  FRONTEND_DIR: frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets and vars
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          FRONTEND_DOMAINS_JSON: ${{ vars.TF_VAR_FRONTEND_DOMAINS_JSON }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          set -euo pipefail
          required=(
            PROJECT_ID
            WIF_PROVIDER
            WIF_SERVICE_ACCOUNT
            TF_STATE_BUCKET
            FRONTEND_DOMAINS_JSON
            VITE_API_BASE_URL
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required GitHub secret/var: $key" >&2
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_PREFIX_FRONTEND: ${{ secrets.TF_STATE_PREFIX_FRONTEND }}
        run: |
          set -euo pipefail
          PREFIX="${TF_STATE_PREFIX_FRONTEND:-ai-agent/frontend_spa_cdn}"
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${PREFIX}"

      - name: Terraform apply frontend infra
        id: terraform_apply
        working-directory: ${{ env.TF_DIR }}
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_frontend_domains: ${{ vars.TF_VAR_FRONTEND_DOMAINS_JSON }}
          TF_VAR_FRONTEND_BUCKET_NAME: ${{ vars.TF_VAR_FRONTEND_BUCKET_NAME }}
          TF_VAR_FRONTEND_BUCKET_LOCATION: ${{ vars.TF_VAR_FRONTEND_BUCKET_LOCATION }}
          TF_VAR_FRONTEND_RESOURCE_NAME_PREFIX: ${{ vars.TF_VAR_FRONTEND_RESOURCE_NAME_PREFIX }}
        run: |
          set -euo pipefail
          TF_ARGS=("-var=project_id=${PROJECT_ID}")

          if [ -n "${TF_VAR_FRONTEND_BUCKET_NAME:-}" ]; then
            TF_ARGS+=("-var=bucket_name=${TF_VAR_FRONTEND_BUCKET_NAME}")
          fi

          if [ -n "${TF_VAR_FRONTEND_BUCKET_LOCATION:-}" ]; then
            TF_ARGS+=("-var=bucket_location=${TF_VAR_FRONTEND_BUCKET_LOCATION}")
          fi

          if [ -n "${TF_VAR_FRONTEND_RESOURCE_NAME_PREFIX:-}" ]; then
            TF_ARGS+=("-var=resource_name_prefix=${TF_VAR_FRONTEND_RESOURCE_NAME_PREFIX}")
          fi

          terraform apply -auto-approve -input=false "${TF_ARGS[@]}"

          FRONTEND_BUCKET_NAME="$(terraform output -raw frontend_bucket_name)"
          FRONTEND_URL="$(terraform output -raw frontend_https_url)"
          echo "frontend_bucket_name=${FRONTEND_BUCKET_NAME}" >> "$GITHUB_OUTPUT"
          echo "frontend_url=${FRONTEND_URL}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Upload build to Cloud Storage bucket
        env:
          FRONTEND_BUCKET_NAME: ${{ steps.terraform_apply.outputs.frontend_bucket_name }}
        run: |
          set -euo pipefail
          gcloud storage rsync --recursive --delete-unmatched-destination-objects \
            "${FRONTEND_DIR}/dist" \
            "gs://${FRONTEND_BUCKET_NAME}"

      - name: Set cache headers for SPA assets
        env:
          FRONTEND_BUCKET_NAME: ${{ steps.terraform_apply.outputs.frontend_bucket_name }}
        run: |
          set -euo pipefail
          gcloud storage objects update "gs://${FRONTEND_BUCKET_NAME}/index.html" \
            --cache-control="no-cache,max-age=0,must-revalidate"

          ASSET_OBJECTS="$(gcloud storage ls "gs://${FRONTEND_BUCKET_NAME}/assets/**" || true)"
          if [ -n "${ASSET_OBJECTS}" ]; then
            while IFS= read -r object_uri; do
              if [[ "${object_uri}" == */ ]]; then
                continue
              fi
              gcloud storage objects update "${object_uri}" \
                --cache-control="public,max-age=31536000,immutable"
            done <<< "${ASSET_OBJECTS}"
          fi

      - name: Summary
        run: |
          echo "Frontend deployed to: ${{ steps.terraform_apply.outputs.frontend_url }}"
