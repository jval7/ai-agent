services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-agent-backend
    env_file:
      - .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/.secrets/gcp-adc-gmail.json
      CORS_ALLOWED_ORIGINS_OVERRIDE: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - ./.secrets/gcp-adc-gmail.json:/app/.secrets/gcp-adc-gmail.json:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-agent-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
